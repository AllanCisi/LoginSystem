<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redefinir Senha | Login System</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/favicon.png">
  <link rel="stylesheet" href="style.css">
  <style>
    .hidden { display: none !important; }
    .step-indicator { font-size: 0.8rem; color: #3b82f6; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px;}
  </style>
</head>
<body>
<div class="login-container">

  <div id="step-1">
    <div class="login-header">
      <h2>Redefinir Senha</h2>
      <p>Confirme a sua identidade por e-mail.</p>
    </div>

    <form id="step1Form">
      <div class="input-group">
        <label for="email">E-mail Cadastrado</label>
        <div class="email-row">
          <input type="email" id="email" required placeholder="seu@email.com">
          <button type="button" id="sendCodeBtn" class="btn-secondary">Enviar Código</button>
        </div>
      </div>

      <div class="input-group">
        <label for="resetCode">Código do E-mail</label>
        <input type="text" id="resetCode" required placeholder="Código de 6 dígitos" maxlength="6">
      </div>

      <button type="submit" id="btnNextStep1">Avançar →</button>
    </form>

    <p id="msgStep1" class="message"></p>

    <div class="footer-link">
      <a href="index.html">← Voltar para o Login</a>
    </div>
  </div>

  <div id="step-2" class="hidden">
    <div class="login-header">
      <h2>Proteção 2FA Ativa</h2>
      <p>A sua conta tem uma camada extra de segurança.</p>
    </div>

    <form id="step2Form">
      <div class="input-group">
        <label for="totpCode">Código do Google Authenticator</label>
        <input type="text" id="totpCode" required placeholder="000 000" maxlength="6" style="text-align: center; font-size: 1.5rem; letter-spacing: 5px;">
      </div>

      <button type="submit" id="btnNextStep2">Verificar e Avançar →</button>
      <button type="button" id="btnBackTo1" class="btn-secondary" style="width: 100%; margin-top: 10px; background-color: transparent; border: 1px solid #334155;">← Voltar</button>
    </form>

    <p id="msgStep2" class="message"></p>
  </div>

  <div id="step-3" class="hidden">
    <div class="login-header">
      <h2>Criar Nova Senha</h2>
      <p>Defina uma nova senha segura para a sua conta.</p>
    </div>

    <form id="step3Form">
      <div class="input-group">
        <label for="newPassword">Nova Senha</label>
        <input type="password" id="newPassword" required placeholder="••••••••">
      </div>

      <div class="input-group">
        <label for="confirmPassword">Repetir Nova Senha</label>
        <input type="password" id="confirmPassword" required placeholder="••••••••">
      </div>

      <button type="submit" id="btnComplete">Concluir Alteração</button>
      <button type="button" id="btnBackToPrevious" class="btn-secondary" style="width: 100%; margin-top: 10px; background-color: transparent; border: 1px solid #334155;">← Voltar</button>
    </form>

    <p id="msgStep3" class="message"></p>
  </div>

</div>

<script src="forgot-password.js"></script>
</body>
</html>
