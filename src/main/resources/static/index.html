<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login System</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/favicon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="login-container">
    <div class="login-header">
        <h2>Acesso ao Sistema</h2>
        <p>Utilize suas credenciais para acessar o Dashboard.</p>
    </div>

    <form id="loginForm">
        <div class="input-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" required placeholder="admin@portfolio.com">
        </div>

        <div class="input-group">
            <label for="password">Senha</label>
            <input type="password" id="password" required placeholder="••••••••">
        </div>

        <button type="submit" id="submitBtn">Login</button>

        <div style="text-align: center; margin-top: 15px;">
            <a href="forgot-password.html" style="color: #3b82f6; text-decoration: none; font-size: 0.9rem;">Esqueceu a senha?</a>
        </div>
    </form>

    <p id="message" class="message"></p>

    <div class="divider">
        <span>Entre rapidamente</span>
    </div>

    <a href="/oauth2/authorization/google" class="btn-google">
        <svg viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            <path fill="none" d="M0 0h48v48H0z"/>
        </svg>
        Continuar com o Google
    </a>

    <div style="text-align: center; margin-top: 20px; padding-top: 20px; border-top: 1px solid #334155;">
        <span style="color: #94a3b8; font-size: 0.9rem;">Ainda não tem uma conta?</span>
        <a href="register.html" style="color: #3b82f6; text-decoration: none; font-size: 0.9rem; font-weight: bold; margin-left: 5px;">Cadastre aqui</a>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
